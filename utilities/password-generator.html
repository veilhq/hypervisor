<div class="pw-layout">
  <div class="utility-container">
    <h1><i data-lucide="lock-keyhole" class="utility-title-icon"></i> Password Generator</h1>
    <div class="pw-output-wrap">
      <input type="text" id="pw-output" class="pw-output" readonly spellcheck="false" value="">
      <button class="pw-copy" id="pw-copy" aria-label="Copy password">copy</button>
    </div>
    <div class="pw-strength" id="pw-strength"></div>
    <div class="pw-controls">
      <div class="pw-control-row">
        <label for="pw-length">Length</label>
        <input type="range" id="pw-length" min="4" max="128" value="20">
        <span class="pw-length-val" id="pw-length-val">20</span>
      </div>
      <div class="pw-control-row">
        <label><input type="checkbox" id="pw-upper" checked> Uppercase <span class="pw-chars">A-Z</span></label>
      </div>
      <div class="pw-control-row">
        <label><input type="checkbox" id="pw-lower" checked> Lowercase <span class="pw-chars">a-z</span></label>
      </div>
      <div class="pw-control-row">
        <label><input type="checkbox" id="pw-digits" checked> Digits <span class="pw-chars">0-9</span></label>
      </div>
      <div class="pw-control-row">
        <label><input type="checkbox" id="pw-symbols" checked> Symbols <span class="pw-chars">!@#$%^&*…</span></label>
      </div>
      <div class="pw-control-row">
        <label><input type="checkbox" id="pw-ambiguous"> Exclude ambiguous <span class="pw-chars">0O l1I</span></label>
      </div>
      <button class="pw-generate" id="pw-generate"><i data-lucide="refresh-cw" style="width:12px;height:12px;vertical-align:-1px"></i> Generate</button>
    </div>
  </div>
  <div class="pw-history-panel">
    <div class="pw-history-header">
      <span><i data-lucide="history" style="width:12px;height:12px;vertical-align:-1px"></i> History</span>
      <button class="pw-history-clear" id="pw-history-clear">clear</button>
    </div>
    <div class="pw-history-list" id="pw-history-list">
      <div class="pw-history-empty">Generated passwords appear here</div>
    </div>
  </div>
</div>

<script>
(function() {
  var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var LOWER = 'abcdefghijklmnopqrstuvwxyz';
  var DIGITS = '0123456789';
  var SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?/~`';
  var AMBIGUOUS = '0OlI1';

  var output = document.getElementById('pw-output');
  var copyBtn = document.getElementById('pw-copy');
  var genBtn = document.getElementById('pw-generate');
  var lengthSlider = document.getElementById('pw-length');
  var lengthVal = document.getElementById('pw-length-val');
  var strengthBar = document.getElementById('pw-strength');
  var historyList = document.getElementById('pw-history-list');
  var clearBtn = document.getElementById('pw-history-clear');
  var history = [];
  var MAX_HISTORY = 15;

  function getCharset() {
    var chars = '';
    if (document.getElementById('pw-upper').checked) chars += UPPER;
    if (document.getElementById('pw-lower').checked) chars += LOWER;
    if (document.getElementById('pw-digits').checked) chars += DIGITS;
    if (document.getElementById('pw-symbols').checked) chars += SYMBOLS;
    if (document.getElementById('pw-ambiguous').checked) {
      for (var i = 0; i < AMBIGUOUS.length; i++) {
        chars = chars.split(AMBIGUOUS[i]).join('');
      }
    }
    return chars;
  }

  function getStrengthInfo(pw, charset) {
    var entropy = Math.floor(pw.length * Math.log2(charset.length));
    var label, cls;
    if (entropy < 40) { label = 'weak'; cls = 'pw-str-weak'; }
    else if (entropy < 60) { label = 'fair'; cls = 'pw-str-fair'; }
    else if (entropy < 80) { label = 'good'; cls = 'pw-str-good'; }
    else if (entropy < 120) { label = 'strong'; cls = 'pw-str-strong'; }
    else { label = 'excellent'; cls = 'pw-str-excellent'; }
    return { entropy: entropy, label: label, cls: cls };
  }

  function addToHistory(pw, strength) {
    history.unshift({ pw: pw, strength: strength, time: new Date() });
    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) {
      historyList.innerHTML = '<div class="pw-history-empty">Generated passwords appear here</div>';
      return;
    }
    historyList.innerHTML = history.map(function(item, idx) {
      var timeStr = item.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      return '<div class="pw-history-item" data-idx="' + idx + '">' +
        '<div class="pw-history-value">' + escapeHtml(item.pw) + '</div>' +
        '<div class="pw-history-meta">' +
          '<span class="' + item.strength.cls + '">' + item.strength.entropy + 'b</span>' +
          '<span class="pw-history-time">' + timeStr + '</span>' +
          '<button class="pw-history-copy" data-pw="' + idx + '">copy</button>' +
        '</div>' +
      '</div>';
    }).join('');

    historyList.querySelectorAll('.pw-history-copy').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var i = parseInt(this.getAttribute('data-pw'));
        var self = this;
        navigator.clipboard.writeText(history[i].pw).then(function() {
          self.textContent = 'copied';
          self.classList.add('copied');
          setTimeout(function() { self.textContent = 'copy'; self.classList.remove('copied'); }, 1500);
        });
      });
    });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function generate() {
    var charset = getCharset();
    if (!charset) { output.value = '-- select at least one set --'; return; }
    var len = parseInt(lengthSlider.value);
    var arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    var pw = '';
    for (var i = 0; i < len; i++) pw += charset[arr[i] % charset.length];
    output.value = pw;
    var strength = getStrengthInfo(pw, charset);
    strengthBar.textContent = strength.entropy + ' bits — ' + strength.label;
    strengthBar.className = 'pw-strength ' + strength.cls;
    addToHistory(pw, strength);
  }

  lengthSlider.addEventListener('input', function() {
    lengthVal.textContent = this.value;
    generate();
  });

  document.querySelectorAll('#pw-upper,#pw-lower,#pw-digits,#pw-symbols,#pw-ambiguous').forEach(function(el) {
    el.addEventListener('change', generate);
  });

  genBtn.addEventListener('click', generate);

  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(output.value).then(function() {
      copyBtn.textContent = 'copied';
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.textContent = 'copy'; copyBtn.classList.remove('copied'); }, 1500);
    }).catch(function() { copyBtn.textContent = 'err'; setTimeout(function() { copyBtn.textContent = 'copy'; }, 1000); });
  });

  clearBtn.addEventListener('click', function() {
    history = [];
    renderHistory();
  });

  generate();
})();
</script>
